    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/themes/default.css?v={{version}}">

    <link rel="stylesheet" href="/css/gifs.css?v={{version}}">
    <link rel="stylesheet" href="/css/gif_viewer.css?v={{version}}">
    <link rel="stylesheet" href="/css/account.css?v={{version}}">

    <link rel="stylesheet" href="/css/mobile.css?v={{version}}">

    <!-- Core Libs etc -->
    <script src="/js/core/FileManager.js?v={{version}}"></script>
    <script src="/js/core/User.js?v={{version}}"></script>
    <script src="/js/core/ContextMenu.js?v={{version}}"></script>
    <script src="/js/core/PageRenderer.js?v={{version}}"></script>
    <script src="/js/core/elementloader.js?v={{version}}"></script>
    <script src="/js/core/prompts.js?v={{version}}"></script>
    <script src="/js/core/sysmsg.js?v={{version}}"></script>

    <script src="/js/account.js?v={{version}}"></script>
    <script src="/js/api.js?v={{version}}"></script>
    <script src="/js/gifs.js?v={{version}}"></script>
    <script src="js/gifs.js"></script>
</head>
<body>

<div class="layout">
    <div class="header">
        <div class="name">{{title}}</div>

        <div class="buttons">
            <button class="upload" onclick="uploadGIF()">Upload</button>
            <button class="login" onclick="checkAccountPage()">Login</button>
        </div>
    </div>

    <div class="quick-actions">
        <span class="trending-gifs" onclick="displayTrendingGIFs()">Popular GIFs</span>
        <span class="new-gifs" onclick="displayNewGIFs()">New GIFs</span>
        <span class="rules">Rules</span>
    </div>

    <div class="search">
        <input type="text" placeholder="Search GIFs...">
    </div>

    <div class="content"></div>

    <div class="footer">
        {{footer}}
    </div>
</div>


<script>
    let customPrompt = new Prompt();

    document.addEventListener("DOMContentLoaded", async () => {
        ContextMenu.init();

        displayTrendingGIFs()
        registerGifContext()
        registerAccountContext()

        //showAccountPopup("account");
    })

    async function checkAccountPage(error = null){
        let isLoggedIn = await User.Auth.loggedIn();
        if(!isLoggedIn?.error){
            showAccountPopup("account");
        }
        else{
            // show login
            customPrompt.showPrompt(
                "Login",
                `
                ${
                    error ?
                        `<div class="login-error">
                            ${error}
                        </div>`
                    : ""
                }


                <div class="login-container">
                    <input type="text" class="prompt-input" id="username" name="username" placeholder="Username...">
                    <input type="text" class="prompt-input" id="password" name="password" placeholder="Password...">
                </div><br>

                <a style="display: flex;justify-content: center; width: 100%; margin: auto;">Register an account instead</a>
        `,
                async (values) => {
                    console.log(values)
                    if(!values?.username){
                        return checkAccountPage("You didnt enter an username")
                    }

                    if(!values?.password){
                        return checkAccountPage("You didnt enter a password")
                    }

                    let loginResult = await User.Auth.login(values.username, values.password);

                    if(loginResult?.error){
                        return checkAccountPage(loginResult.error)
                    }
                    else{
                        if(loginResult?.id && loginResult?.token){
                            console.log(loginResult)
                        }
                    }
                },
                ["Login", "normal"]
            )
        }
    }

    function findAttributeUp(element, attr, maxDepth = 10) {
        for (let i = 0; i <= maxDepth && element; i++) {
            const val = element.getAttribute?.(attr);
            if (val !== null) return val;
            element = element.parentNode;
        }
        return null;
    }

    function extractHost(url){
        if(!url) return null;
        const s = String(url).trim();

        const looksLikeBareIPv6 = !s.includes('://') && !s.includes('/') && s.includes(':') && /^[0-9A-Fa-f:.]+$/.test(s);
        const withProto = looksLikeBareIPv6 ? `https://[${s}]` : (s.includes('://') ? s : `https://${s}`);

        try {
            const u = new URL(withProto);
            const host = u.hostname; // IPv6 returned without brackets
            const port = u.port;
            if (host.includes(':')) {
                return port ? `[${host}]:${port}` : host;
            }
            return port ? `${host}:${port}` : host;
        } catch (e) {
            const re = /^(?:https?:\/\/)?(?:[^@\/\n]+@)?([^:\/?#]+)(?::(\d+))?(?:[\/?#]|$)/i;
            const m = s.match(re);
            if (!m) return null;
            const hostname = m[1].replace(/^\[(.*)\]$/, '$1');
            const port = m[2];
            if (hostname.includes(':')) return port ? `[${hostname}]:${port}` : hostname;
            return port ? `${hostname}:${port}` : hostname;
        }
    }

    function truncateString(str, len){
        str = String(str);
        if (str.length <= len) return str;
        return str.substring(0, len) + "...";
    }


    function getContentContainer(){
        return document.querySelector(".layout .content");
    }

    function getSearchInput(){
        return document.querySelector(".layout .search input");
    }
</script>


</body>
</html>
