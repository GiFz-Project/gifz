<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>{{project_name}} - Open Source GIF API</title>

    <link rel="stylesheet" href="/css/themes/default.css?v={{version}}">

    <link rel="stylesheet" href="/css/gifs.css?v={{version}}">
    <link rel="stylesheet" href="/style.css?v={{version}}">

    <!-- Core Libs etc -->
    <script src="/js/core/FileManager.js?v={{version}}"></script>
    <script src="/js/core/ContextMenu.js?v={{version}}"></script>
    <script src="/js/core/PageRenderer.js?v={{version}}"></script>
    <script src="/js/core/elementloader.js?v={{version}}"></script>
    <script src="/js/core/prompts.js?v={{version}}"></script>
    <script src="/js/core/sysmsg.js?v={{version}}"></script>

    <script src="/js/api.js?v={{version}}"></script>
    <script src="/js/gifs.js?v={{version}}"></script>
</head>
<body>

<div class="layout">
    <div class="header">
        <div class="name">{{project_name}} - Open Source GIF API</div>

        <div class="buttons">
            <button class="upload" onclick="uploadGIF()">Upload</button>
            <button class="login">Login</button>
        </div>
    </div>

    <div class="quick-actions">
        <span class="trending-gifs">Popular GIFs</span>
        <span class="new-gifs">New GIFs</span>
        <span class="rules">Rules</span>
    </div>

    <div class="search">
        <input type="text" placeholder="Search GIFs...">
    </div>

    <div class="content"></div>

    <div class="footer">
        test
    </div>
</div>


<script>
    let customPrompt = new Prompt();

    document.addEventListener("DOMContentLoaded", async () => {
        diplayTrendingGIFs()
    })

    function getContentContainer(){
        return document.querySelector(".layout .content");
    }
</script>


</body>
</html>
